    <title>Simulador de Opiniones y Perspectivas Climáticas - UNJu</title>
    <style>
        :root {
            --primary-color: #2e524a;
            --primary-light: #f0f5f4;
            --accent-myth: #c27838;
            --accent-science: #3b7a57;
            --accent-ethical: #6b5b95;
            --text-main: #2c3e50;
            --bg-main: #f4f7f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.5;
            color: var(--text-main);
            background-color: var(--bg-main);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #1e332f 0%, #345e54 100%);
            color: white;
            padding: 25px 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        header p {
            margin: 5px 0 0 0;
            opacity: 0.9;
            font-size: 15px;
        }

        .badge-ethics {
            background-color: #6b5b95;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 12px;
            display: inline-block;
            margin-top: 10px;
        }

        .instruction-box {
            background-color: #fdfaf6;
            border-left: 4px solid #c27838;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 25px;
        }

            padding: 25px;

            border: 1px solid #e4e9e7;
        }
